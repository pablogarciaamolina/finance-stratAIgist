services:
  finance-strataigist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-strataigist
    image: finance-strataigist:latest

    runtime: nvidia

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface

    volumes:
      - .:/app
      - ../.env:/app/.env
      - ./.cache/huggingface:/app/.cache/huggingface

    working_dir: /app

    stdin_open: true
    tty: true
    ports:
      - "8045:8045"

    network_mode: bridge
    restart: unless-stopped